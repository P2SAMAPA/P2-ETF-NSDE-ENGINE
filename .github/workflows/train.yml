name: NSDE Daily Train & Signal Update

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'     # Daily training at 00:30 UTC
    - cron: '0 23 * * 1-5'   # Daily signal update at 23:00 UTC Mon-Fri

jobs:
  daily_train:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 0 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install training dependencies
        run: pip install -r requirements_train.txt
      - name: Validate input dataset
        run: python validate_dataset.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - name: Train NSDE Model (daily)
        run: python train.py --option both
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      # Model upload is handled inside train.py – no separate step needed

  daily_signal_update:
    if: github.event.schedule == '0 23 * * 1-5'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate daily NSDE signals
        run: python update_daily.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - name: Upload signals to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U huggingface_hub
          hf upload P2SAMAPA/p2-etf-nsde-engine-results signals/ signals/ --token $HF_TOKEN
